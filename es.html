// App state
let currentNode = TREE;
let path = [];

function render() {
  const app = document.getElementById('app');
  
  if (currentNode.result) {
    renderResult(app, currentNode.result);
    return;
  }
  
  const progress = ((currentNode.step - 1) / currentNode.totalSteps) * 100;
  
  let optionsHTML = currentNode.options.map((opt, i) => `
    <button class="option-btn" onclick="selectOption(${i})">
      <div class="option-emoji">${opt.emoji}</div>
      <div class="option-content">
        <div class="option-label">${opt.label}</div>
        ${opt.sublabel ? `<div class="option-sublabel">${opt.sublabel}</div>` : ''}
      </div>
    </button>
  `).join('');
  
  app.innerHTML = `
    <div class="card">
      <div class="step-indicator">Pregunta ${currentNode.step} de ${currentNode.totalSteps}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="question-text">${currentNode.question}</div>
      <div class="question-flavor">${currentNode.flavor}</div>
      <div class="options">${optionsHTML}</div>
    </div>
    ${path.length > 0 ? `<div class="counter"><button class="toggle-btn" onclick="goBack()" style="font-size:0.75rem;padding:6px 14px;">← Volver atrás</button></div>` : ''}
  `;
}

function selectOption(index) {
  const option = currentNode.options[index];
  path.push({ node: currentNode, label: option.pathLabel });
  currentNode = option.next;
  
  if (currentNode.result) {
    renderResult(document.getElementById('app'), currentNode.result);
  } else {
    render();
  }
}

function renderResult(app, resultKey) {
  const r = RESULTS[resultKey];
  
  let pathHTML = path.map((p, i) => 
    `<span class="path-item">${p.label}</span>${i < path.length - 1 ? '<span class="path-arrow">›</span>' : ''}`
  ).join('');
  
  app.innerHTML = `
    <div class="card result-card">
      <div class="step-indicator">🎯 Tu resultado</div>
      <div class="path-display">${pathHTML}</div>
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-cat ${r.cat}">${r.catLabel}</div>
      <div class="result-name">${r.name}</div>
      <div class="result-tagline">"${r.tagline}"</div>
      <div class="result-desc">${r.desc}</div>
      <div class="result-humor">${r.humor}</div>
      <div class="result-evidence"><strong>Evidencia científica:</strong> ${r.evidence}</div>
      <div style="margin-top:20px;padding:20px;background:linear-gradient(135deg,#2B4C7E,#4A7C8B);border-radius:12px;text-align:center;">
        <p style="color:rgba(255,255,255,0.9);font-size:0.85rem;margin-bottom:12px;line-height:1.5;">¿Quieres la <strong style="color:white;">historia completa</strong> de ${r.name}? Cómo funciona una sesión, qué dice la ciencia, y mucho más humor.</p>
        <p style="color:white;font-weight:700;font-size:0.85rem;margin-bottom:12px;">Consigue el libro — 16 terapias con el Magufómetro.</p>
        <a href="#" style="display:inline-block;padding:12px 28px;background:white;color:#2B4C7E;border-radius:10px;font-weight:700;font-size:0.9rem;text-decoration:none;">📚 Consigue el Libro en Amazon</a>
      </div>
      <div style="margin-top:16px;">
        <p style="font-size:0.8rem;color:#999;margin-bottom:8px;">Comparte tu resultado:</p>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <a style="padding:8px 16px;border-radius:8px;font-size:0.8rem;font-weight:600;text-decoration:none;color:white;background:#1DA1F2;" href="https://twitter.com/intent/tweet?text=${encodeURIComponent('Hice el test de Elige Tu Propia Autoayuda y me salió: ' + r.name + '! ' + r.tagline + ' 🔮 Haz el test:')}&url=${encodeURIComponent('https://yantahari.github.io/choose-your-own-self-help/es.html')}" target="_blank">Twitter/X</a>
          <a style="padding:8px 16px;border-radius:8px;font-size:0.8rem;font-weight:600;text-decoration:none;color:white;background:#25D366;" href="https://wa.me/?text=${encodeURIComponent('Hice el test de Elige Tu Propia Autoayuda y me salió: ' + r.name + '! Haz el test: https://yantahari.github.io/choose-your-own-self-help/es.html')}" target="_blank">WhatsApp</a>
        </div>
      </div>
      <button class="btn-restart" onclick="restart()">🔄 Volver a empezar</button>
    </div>
  `;
}

function restart() {
  currentNode = TREE;
  path = [];
  render();
}

function goBack() {
  if (path.length > 0) {
    const prev = path.pop();
    currentNode = prev.node;
    render();
  }
}

// Tree overview
function toggleTree() {
  const el = document.getElementById('treeOverview');
  el.classList.toggle('visible');
  if (el.classList.contains('visible') && el.innerHTML === '') {
    el.innerHTML = buildTreeHTML(TREE, 0);
  }
}

function buildTreeHTML(node, depth) {
  if (node.result) {
    const r = RESULTS[node.result];
    return `<div class="tree-result">${r.emoji} ${r.name}</div>`;
  }
  
  let html = `<div class="tree-question">${node.question}</div>`;
  html += '<div class="tree-node">';
  node.options.forEach(opt => {
    html += `<div class="tree-option"><strong>${opt.emoji} ${opt.label}</strong></div>`;
    html += `<div class="tree-node">${buildTreeHTML(opt.next, depth + 1)}</div>`;
  });
  html += '</div>';
  return html;
}

// Init
render();
