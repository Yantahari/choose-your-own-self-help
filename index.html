// Amazon links (placeholder until books are published)
const AMAZON_EN = "#";
const AMAZON_ES = "#";

let currentNode = TREE;
let path = [];

function render() {
  const app = document.getElementById('app');
  if (currentNode.result) { renderResult(app, currentNode.result); return; }
  const progress = ((currentNode.step - 1) / currentNode.totalSteps) * 100;
  let optionsHTML = currentNode.options.map((opt, i) => `
    <button class="option-btn" onclick="selectOption(${i})">
      <div class="option-emoji">${opt.emoji}</div>
      <div class="option-content">
        <div class="option-label">${opt.label}</div>
        ${opt.sublabel ? `<div class="option-sublabel">${opt.sublabel}</div>` : ''}
      </div>
    </button>`).join('');
  app.innerHTML = `<div class="card">
    <div class="step-indicator">Question ${currentNode.step} of ${currentNode.totalSteps}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="question-text">${currentNode.question}</div>
    <div class="question-flavor">${currentNode.flavor}</div>
    <div class="options">${optionsHTML}</div>
  </div>
  ${path.length > 0 ? '<div class="counter"><button class="btn-restart" onclick="goBack()" style="font-size:0.75rem;padding:6px 14px;">\u2190 Go back</button></div>' : ''}`;
}

function selectOption(i) {
  const opt = currentNode.options[i];
  path.push({ node: currentNode, label: opt.pathLabel });
  currentNode = opt.next;
  if (currentNode.result) renderResult(document.getElementById('app'), currentNode.result);
  else render();
}

function renderResult(app, key) {
  const r = RESULTS[key];
  let pathHTML = path.map((p, i) => `<span style="display:inline-block;font-size:0.65rem;background:#e8f4f5;color:#4A7C8B;padding:3px 10px;border-radius:12px;font-weight:600;">${p.label}</span>${i < path.length - 1 ? '<span style="color:#ccc;font-size:0.7rem;margin:0 4px;">\u203a</span>' : ''}`).join('');
  let wooDots = '';
  for (let i = 1; i <= 5; i++) wooDots += `<div class="woo-dot${i <= r.woo ? ' filled' : ''}"></div>`;

  const shareText = encodeURIComponent(`I took the "Choose Your Own Self-Help" quiz and got: ${r.name}! ${r.tagline} \ud83d\udd2e Take the quiz:`);
  const shareUrl = encodeURIComponent('https://yantahari.github.io/choose-your-own-self-help/');

  app.innerHTML = `<div class="card result-card">
    <div class="step-indicator">\ud83c\udfaf Your result</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;justify-content:center;">${pathHTML}</div>
    <div class="result-emoji">${r.emoji}</div>
    <div class="result-cat ${r.cat}">${r.catLabel}</div>
    <div class="result-name">${r.name}</div>
    <div class="result-tagline">"${r.tagline}"</div>
    <div class="result-desc">${r.desc}</div>
    <div class="result-humor">\ud83d\ude04 ${r.humor}</div>
    <div class="woo-meter"><span>Woo-Woo Meter:</span> <div class="woo-dots">${wooDots}</div> <span>${r.woo}/5</span></div>
    <div class="cta-section">
      <p>Want the <strong>full story</strong> on ${r.name}? How a session works, what science really says, and much more humor?</p>
      <p><strong>Get the book \u2014 16 therapies, all with the Woo-Woo Meter.</strong></p>
      <a class="cta-btn" href="buy-en.html">\ud83d\udcda Get the Book on Amazon</a>
    </div>
    <div class="share-section">
      <p>Share your result:</p>
      <div class="share-btns">
        <a class="share-btn twitter" href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}" target="_blank">Twitter/X</a>
        <a class="share-btn whatsapp" href="https://wa.me/?text=${shareText}%20${shareUrl}" target="_blank">WhatsApp</a>
        <button class="share-btn copy" onclick="navigator.clipboard.writeText('I got ${r.name}! Take the quiz: https://yantahari.github.io/choose-your-own-self-help/');this.textContent='\u2705 Copied!'">Copy link</button>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">\ud83d\udd04 Start over</button>
  </div>`;
}

function restart() { currentNode = TREE; path = []; render(); }
function goBack() { if (path.length > 0) { currentNode = path.pop().node; render(); } }
render();
</script>
